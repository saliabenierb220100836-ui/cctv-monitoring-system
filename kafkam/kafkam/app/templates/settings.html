{% extends "layout.html" %}
{% block title %}Settings{% endblock %}

{% block authenticated_content %}
<div class="max-w-2xl space-y-6">

    <!-- Account Information -->
    <div class="bg-black/50 rounded border border-white/20 shadow-2xl p-6">
        <div class="flex items-center gap-3 mb-6">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <div>
                <h3 class="text-base font-bold text-white tracking-widest uppercase">Account Information</h3>
                <p class="text-xs text-gray-500 mt-0.5">Update your username.</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('main.update_username') }}" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 tracking-widest uppercase">Username</label>
                <input type="text" name="username" value="{{ current_user.username }}" required
                       class="w-full px-4 py-3 bg-black/50 border border-white/20 text-white rounded
                              focus:outline-none focus:ring-1 focus:ring-white/50 focus:border-transparent
                              text-sm">
            </div>
            <button type="submit"
                    class="w-full bg-white/10 text-white py-3 rounded hover:bg-white/20 transition-colors
                           font-medium tracking-widest uppercase text-sm border border-white/20 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                Save Username
            </button>
        </form>
    </div>

    <!-- Change Password -->
    <div class="bg-black/50 rounded border border-white/20 shadow-2xl p-6">
        <div class="flex items-center gap-3 mb-6">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <div>
                <h3 class="text-base font-bold text-white tracking-widest uppercase">Change Password</h3>
                <p class="text-xs text-gray-500 mt-0.5">Keep your account secure.</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('main.update_password') }}" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 tracking-widest uppercase">Current Password</label>
                <input type="password" name="current_password" placeholder="Enter current password" required
                       class="w-full px-4 py-3 bg-black/50 border border-white/20 text-white rounded
                              focus:outline-none focus:ring-1 focus:ring-white/50 focus:border-transparent
                              placeholder:text-gray-600 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 tracking-widest uppercase">New Password</label>
                <input type="password" name="new_password" placeholder="Enter new password" required
                       class="w-full px-4 py-3 bg-black/50 border border-white/20 text-white rounded
                              focus:outline-none focus:ring-1 focus:ring-white/50 focus:border-transparent
                              placeholder:text-gray-600 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 tracking-widest uppercase">Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm new password" required
                       class="w-full px-4 py-3 bg-black/50 border border-white/20 text-white rounded
                              focus:outline-none focus:ring-1 focus:ring-white/50 focus:border-transparent
                              placeholder:text-gray-600 text-sm">
            </div>
            <button type="submit"
                    class="w-full bg-white/10 text-white py-3 rounded hover:bg-white/20 transition-colors
                           font-medium tracking-widest uppercase text-sm border border-white/20 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                Update Password
            </button>
        </form>
    </div>

</div>
{% endblock %}
