{% extends "layout.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6 px-4 py-2 lg:px-0">
    <div class="rounded-[32px] border border-slate-200 bg-white p-6 shadow-[0_30px_80px_rgba(15,23,42,0.08)]">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-2xl text-slate-400">👤</span>
            <div>
                <h3 class="text-xl font-bold text-slate-900">Account Information</h3>
                <p class="text-sm text-slate-500">Manage your account profile.</p>
            </div>
        </div>
        
        <label class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
        <div class="w-full rounded-3xl border border-slate-200 bg-slate-50 p-4 text-slate-800 font-medium">
            {{ current_user.username }}
        </div>
    </div>

    <div class="rounded-[32px] border border-slate-200 bg-white p-6 shadow-[0_30px_80px_rgba(15,23,42,0.08)]">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-2xl text-slate-400">🔒</span>
            <div>
                <h3 class="text-xl font-bold text-slate-900">Change Password</h3>
                <p class="text-sm text-slate-500">Update your password to keep your account secure.</p>
            </div>
        </div>
        
        <form action="/update-password" method="POST" class="space-y-5">
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">Current Password</label>
                <input type="password" placeholder="Enter current password" class="w-full rounded-[20px] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition">
            </div>
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">New Password</label>
                <input type="password" placeholder="Enter new password" class="w-full rounded-[20px] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition">
            </div>
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">Confirm New Password</label>
                <input type="password" placeholder="Confirm new password" class="w-full rounded-[20px] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition">
            </div>
            <button class="w-full rounded-[20px] bg-slate-950 px-4 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-white transition hover:bg-slate-800">Update Security</button>
        </form>
    </div>
</div>
{% endblock %}
