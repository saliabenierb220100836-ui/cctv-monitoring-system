<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #1b3a70 0%, #0f1f4e 35%, #07132a 100%);
            color: #1f2937;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: transparent;
            border-bottom: none;
        }
        .card {
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
        }
        .login-card {
            max-width: 420px;
            border: none;
            border-radius: 28px;
            overflow: hidden;
        }
        .login-card .card-body {
            padding: 2rem 2.25rem;
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .login-subtitle {
            color: #6b7280;
            margin-bottom: 1.75rem;
        }
        .form-control {
            border-radius: 16px;
            border: 1px solid #d2d6dc;
            background: #f8fafc;
            color: #111827;
            padding: 1rem 1.1rem;
        }
        .form-control:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.16);
        }
        .form-label {
            font-weight: 600;
            color: #374151;
        }
        .btn-login {
            border-radius: 16px;
            padding: 0.95rem 1rem;
            font-weight: 700;
        }
        .login-footer {
            color: #6b7280;
        }
        .login-footer a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        body.login-page .navbar,
        body.login-page .container-fluid > .row {
            display: none !important;
        }
        body.login-page .login-container {
            min-height: 100vh;
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🛡️ CCTV Monitoring System</span>
            <div class="d-flex">
                <span class="badge bg-success">System Online</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
