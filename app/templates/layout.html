<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #0a1424 0%, #081023 33%, #03080f 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .app-shell {
            min-height: 100vh;
            display: flex;
            background: transparent;
        }
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, rgba(11, 22, 45, 1), rgba(10, 17, 33, 1));
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            gap: 2rem;
        }
        .sidebar .brand {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #ffffff;
            margin-bottom: 0.35rem;
        }
        .sidebar small {
            color: #94a3b8;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.95rem 1rem;
            color: #d1d5db;
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        .sidebar-nav a.active,
        .sidebar-nav a:hover {
            background: rgba(96, 165, 250, 0.14);
            color: #ffffff;
        }
        .sidebar-nav a.active {
            box-shadow: inset 4px 0 0 0 rgba(96, 165, 250, 0.9);
        }
        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .sidebar-user {
            font-size: 0.95rem;
            margin-bottom: 1rem;
            color: #e2e8f0;
        }
        .btn-logout {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.9rem 1rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
        }
        .main-content {
            flex: 1;
            padding: 2rem 2rem 2.5rem;
        }
        .content-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .content-header h1 {
            margin: 0;
            font-size: 2rem;
            color: #f8fafc;
        }
        .content-header p {
            margin: 0.35rem 0 0;
            color: #94a3b8;
            font-size: 0.96rem;
        }
        .panel-card {
            background: rgba(8, 16, 32, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.22);
        }
        .panel-card .card-body {
            padding: 1.75rem;
        }
        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.75rem;
        }
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(34, 197, 94, 0.14);
            color: #bbf7d0;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 700;
        }
        .status-chip.offline {
            background: rgba(248, 113, 113, 0.14);
            color: #fecaca;
        }
        .table thead th {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }
        .table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .table td,
        .table th {
            color: #e2e8f0;
            vertical-align: middle;
            border-top: none;
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .badge {
            font-size: 0.8rem;
            font-weight: 700;
        }
        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.18);
        }
        .btn-outline-light:hover {
            color: #111827;
            background-color: #f8fafc;
        }
        .login-card {
            max-width: 420px;
            border: none;
            border-radius: 28px;
            overflow: hidden;
        }
        .login-card .card-body {
            padding: 2rem 2.25rem;
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }
        .login-subtitle {
            color: #475569;
            margin-bottom: 1.75rem;
        }
        .form-control {
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: #f8fafc;
            color: #111827;
            padding: 1rem 1.1rem;
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
        .form-control:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.18);
            background: #ffffff;
            color: #111827;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
        }
        .btn-login {
            border-radius: 16px;
            padding: 0.95rem 1rem;
            font-weight: 700;
        }
        .login-footer {
            color: #475569;
        }
        .login-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .text-muted {
            color: #94a3b8 !important;
        }
        .ratio {
            min-height: 320px;
        }
        body.login-page .app-shell {
            display: none !important;
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="app-shell">
        <aside class="sidebar">
            <div>
                <div class="brand">KAFKAM</div>
                <small>Monitoring System</small>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('main.index') }}" class="active">Main Feed</a>
                <a href="{{ url_for('main.index') }}#logs">Activity Logs</a>
                <a href="{{ url_for('main.index') }}#settings">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">Logged in as <strong>{{ current_user.username if current_user.is_authenticated else 'admin' }}</strong></div>
                <a href="{{ url_for('main.logout') }}" class="btn-logout">Logout</a>
            </div>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
