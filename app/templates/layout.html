<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAFKAM - CCTV</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc]">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#0f172a] text-slate-300 flex flex-col fixed h-full shadow-xl">
            <div class="p-8">
                <h1 class="text-2xl font-bold text-white tracking-tight">KAFKAM</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mt-1">Monitoring System</p>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <a href="{{ url_for('main.dashboard') }}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition text-sm">
                    <span class="opacity-70">📹</span> Main Feed
                </a>
                <a href="{{ url_for('main.logs') }}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition text-sm">
                    <span class="opacity-70">📋</span> Activity Logs
                </a>
                <a href="{{ url_for('main.settings') }}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition text-sm">
                    <span class="opacity-70">⚙️</span> Settings
                </a>
            </nav>

            <div class="p-6 border-t border-slate-800 bg-[#0c1425]">
                <p class="text-[10px] text-slate-500 uppercase mb-1">Logged in as</p>
                <p class="text-white font-bold text-sm mb-4">{{ current_user.username }}</p>
                <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-2 text-xs font-semibold text-slate-400 hover:text-white transition">
                    <span>↪</span> Logout
                </a>
            </div>
        </aside>

        <main class="ml-64 flex-1">
            <header class="bg-white border-b border-slate-200 p-6 flex justify-between items-center">
                <h2 class="text-xl font-bold text-[#0f172a]">{% block title %}{% endblock %}</h2>
                <div class="text-xs text-slate-400 font-medium">Philippine Standard Time (PHT)</div>
            </header>
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
