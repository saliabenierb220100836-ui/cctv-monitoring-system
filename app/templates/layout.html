<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f111a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a1d29; border-bottom: 1px solid #333; }
        .card { background-color: #1a1d29; border: 1px solid #2d3142; border-radius: 8px; }
        .video-placeholder { 
            background-color: #000; 
            height: 220px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        .cam-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 2px 8px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🛡️ CCTV Monitoring System</span>
            <div class="d-flex">
                <span class="badge bg-success">System Online</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
