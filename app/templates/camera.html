<!DOCTYPE html>
<html>
<head><title>CCTV Dashboard</title></head>
<body>
  <h1>Live Camera Feed</h1>
  <img id="cam" src="" style="width:640px;">
  <script>
    function refresh() {
      document.getElementById('cam').src =
        'http://192.168.1.10/snapshot.jpg?t='
        + Date.now();
    }
    setInterval(refresh, 1000);
    refresh();
  </script>
</body>
</html>
