{% extends 'layout.html' %}

{% block content %}
<div class="content-header">
    <div>
        <h1>{{ camera_name }}</h1>
        <p>Live IP camera feed from your switch/router connected network.</p>
    </div>
    <a href="{{ url_for('main.index') }}" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
</div>

<div class="panel-card">
    <div class="card-body">
        <div class="ratio ratio-16x9" style="border-radius: 22px; overflow: hidden;">
            <img id="cam" src="{{ camera_url }}" alt="{{ camera_name }}" style="width:100%; height:100%; object-fit:cover;" />
        </div>
        <div class="mt-4 d-flex justify-content-between align-items-center">
            <div>
                <div class="panel-title">Camera Source</div>
                <p class="text-muted mb-0">Snapshot/MJPEG URL used for the live feed.</p>
            </div>
            <span class="status-chip">Live</span>
        </div>
        <div class="mt-3 text-muted">
            <code>{{ camera_url }}</code>
        </div>
    </div>
</div>

<script>
    function refresh() {
        const cam = document.getElementById('cam');
        cam.src = '{{ camera_url }}' + '?t=' + Date.now();
    }
    setInterval(refresh, 1200);
    refresh();
</script>
{% endblock %}
