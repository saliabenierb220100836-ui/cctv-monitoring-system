{% extends "layout.html" %}
{% block body_class %}login-page{% endblock %}
{% block content %}
<div class="login-container">
    <div class="card login-card bg-white">
        <div class="card-body">
            <div class="mb-4 text-center">
                <h1 class="login-title">KAFKAM LOGIN</h1>
                <p class="login-subtitle">Enter your credentials to access the monitoring system</p>
            </div>
            <form method="POST" action="">
                <div class="mb-3">
                    <label class="form-label">Username or Email Address</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="d-flex justify-content-end mb-4">
                    <a href="#" class="login-footer">Recovery Password</a>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-login">Login</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% endblock %}
