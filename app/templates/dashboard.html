{% extends "layout.html" %}
{% block title %}Main Feed{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <p class="text-slate-500 text-sm font-medium">Monitoring 1 active camera</p>
    <div class="flex items-center gap-2 text-[11px] font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-100">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> LIVE FEED
    </div>
</div>

<div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="relative aspect-video bg-[#050505] flex items-center justify-center group">
        <div class="absolute top-5 left-5 z-10 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded flex items-center gap-1.5 shadow-lg">
            <span class="w-1.5 h-1.5 bg-white rounded-full"></span> REC
        </div>

        <img id="camera-frame" 
             src="{{ camera_url }}" 
             class="w-full h-full object-contain"
             onerror="this.style.display='none'; document.getElementById('offline-ui').classList.remove('hidden');">

        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <div class="text-white/20 text-center">
                <span class="text-5xl mb-2 block">📹</span>
                <p class="text-xs uppercase tracking-[0.3em] font-semibold">Live Feed Active</p>
            </div>
        </div>

        <div id="offline-ui" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
            <div class="bg-red-500/10 p-6 rounded-full mb-4">
                <span class="text-4xl">📡</span>
            </div>
            <p class="text-white font-bold text-lg">IP CAM NOT LIVE</p>
            <p class="text-slate-500 text-sm mt-1">Check Network Switch or Router Connection</p>
            <button onclick="location.reload()" class="mt-6 text-xs bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700">Retry Connection</button>
        </div>
    </div>

    <div class="p-6 bg-white flex justify-between items-center border-t border-slate-50">
        <div>
            <h3 class="font-bold text-slate-900 text-xl">{{ camera_name }}</h3>
            <p class="text-slate-400 text-sm">Main Entrance • Subnet 192.168.1.x</p>
        </div>
        <div class="flex items-center gap-2 bg-green-50 text-green-700 px-3 py-1.5 rounded-lg border border-green-100 font-bold text-[11px]">
            📶 ONLINE
        </div>
    </div>
</div>
{% endblock %}
